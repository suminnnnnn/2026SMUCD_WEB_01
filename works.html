<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Works — 제39회 졸업전시</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="works">

  <!-- ===== HEADER (전 페이지 동일) ===== -->
  <header class="site-header">
    <div class="container site-header__inner">
      <a class="brand" href="index.html">
        <span class="brand__logo">logo</span>
        <span class="brand__text">
          <strong>상명대학교</strong><br />
          커뮤니케이션디자인학과<br />
          제 39회 졸업전시회
        </span>
      </a>
      <nav class="main-nav">
        <a href="index.html" data-nav="home">Home</a>
        <a href="works.html" data-nav="works">Works</a>
        <a href="designer.html" data-nav="designer">Designer</a>
        <a href="archive.html" data-nav="archive">Archive</a>
      </nav>
    </div>
  </header>

  <main>
    <!-- 스튜디오 카테고리 탭 (클릭 시 해당 스튜디오로 필터) -->
    <section class="works-cat" id="works-cat">
      <button class="works-tab is-active" type="button" data-studio="convergence">
        <span class="works-tab__ko">융합디자인스튜디오</span>
        <span class="works-tab__en">Convergence Design studio</span>
      </button>
      <button class="works-tab is-active" type="button" data-studio="innovation">
        <span class="works-tab__ko">혁신디자인스튜디오</span>
        <span class="works-tab__en">Innovation Design studio</span>
      </button>
    </section>

    <div class="works-shell">
      <!-- 스튜디오 선택 시 노출 (상태 B) -->
      <section class="studio-intro" id="studio-intro" hidden>
        <h2 class="studio-intro__ko"></h2>
        <p class="studio-intro__en"></p>
        <p class="studio-intro__desc"></p>
      </section>

      <!-- 담당 교수님 필터 (상태 B) -->
      <div class="prof-filter" id="prof-filter" hidden></div>

      <!-- 작품 그리드 (4열) -->
      <div id="works-grid" class="works-grid"></div>
    </div>
  </main>

  <!-- ===== FOOTER (전 페이지 동일) ===== -->
  <footer class="site-footer">
    <div class="container site-footer__inner">
      <div class="footer-brand">
        <p>2026 상명대학교<br />커뮤니케이션디자인전공 졸업전시</p>
        <p class="footer-brand__theme">지우고, 다시 쓰고, 반복하는</p>
      </div>
      <div class="footer-info">
        <dl>
          <dt>전시 기간</dt>
          <dd>2026. 10. 21 ~ 2026. 10. 27 10:00 ~ 19:00</dd>
        </dl>
        <dl>
          <dt>전시장 위치</dt>
          <dd>마루아트센터 - 서울 종로구 인사동길 35-6<br />1관, 2관, 3관, 그랜드관, 5관</dd>
        </dl>
        <dl>
          <dt>인스타그램</dt>
          <dd><a href="https://instagram.com/smucd2026" target="_blank" rel="noopener">@smucd2026</a></dd>
        </dl>
      </div>
    </div>
    <div class="site-footer__bottom">
      <div class="container">© 2026 SMU Communication Design · 제39회 졸업전시</div>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
